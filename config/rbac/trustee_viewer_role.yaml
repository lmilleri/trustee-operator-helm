# This rule is not used by the project trustee-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to trustee.confidentialcontainers.org resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: trustee-operator
    app.kubernetes.io/managed-by: kustomize
  name: trustee-viewer-role
rules:
- apiGroups:
  - trustee.confidentialcontainers.org
  resources:
  - trustees
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - trustee.confidentialcontainers.org
  resources:
  - trustees/status
  verbs:
  - get
